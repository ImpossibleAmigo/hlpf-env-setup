version: '3.8'

services:
  app:
    build: .
    ports:
      - "${APP_PORT:-3000}:3000"
    volumes:
      - ./:/app
      - /app/node_modules
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    env_file:
      - .env
    networks:
      - nestnet

  postgres:
    image: postgres:15-alpine
    restart: always
    env_file:
      - .env
    environment:
      # На випадок, якщо змінні не задані в .env, додамо дефолтні
      POSTGRES_USER: ${DB_USERNAME:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-password}
      POSTGRES_DB: ${DB_DATABASE:-nest_db}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-postgres} -d ${DB_DATABASE:-nest_db}"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - nestnet
    ports:
      - "${DB_PORT:-5432}:5432"

  redis:
    image: redis:alpine
    restart: always
    networks:
      - nestnet
    ports:
      - "6379:6379"

networks:
  nestnet:
    driver: bridge